// ── Components Tab ──────────────────────────────────────────────────────────
function ComponentsTab({ components, setComponents }) {
  const STRAVA_ORANGE = "#fc4c02";
  const BLUE = "#1d9bf0";
  const GREEN = "#22c55e";
  const YELLOW = "#f59e0b";
  const RED = "#f87171";

  const BIKES = [
    "2020 Scott Addict 10 Gravel",
    "2021 Scott Addict RC Ultimate",
    "Scott 2016 Foil Team Issue",
    "Scott Addict 20 Disc 2018",
    "Scott Addict RC Ultimate 2020",
    "Scott Subcross 740 2017",
    "Scott Big Jon 2021 (MTB)",
    "Other",
  ];

  const COMPONENT_TYPES = ["Chain", "Cassette", "Front Derailleur", "Rear Derailleur", "Brake Pads", "Tires", "Bar Tape", "Cable & Housing", "Bottom Bracket", "Chainring", "Pedals", "Saddle", "Other"];

  // Typical km intervals for warning
  const INTERVALS = {
    "Chain": 2000,
    "Cassette": 5000,
    "Brake Pads": 3000,
    "Tires": 5000,
    "Bar Tape": 8000,
    "Cable & Housing": 10000,
    "Bottom Bracket": 15000,
    "Chainring": 15000,
  };

  const emptyForm = { bike_name: BIKES[0], component_type: "Chain", brand: "", model: "", installed_date: "", installed_km: "", notes: "", status: "Active" };
  const [form, setForm] = useState(emptyForm);
  const [showForm, setShowForm] = useState(false);
  const [filterBike, setFilterBike] = useState("All");
  const [filterStatus, setFilterStatus] = useState("Active");
  const [saving, setSaving] = useState(false);

  const active = components.filter(c => c.status === "Active");
  const filtered = components
    .filter(c => filterBike === "All" || c.bike_name === filterBike)
    .filter(c => filterStatus === "All" || c.status === filterStatus)
    .sort((a, b) => (b.installed_date || "") > (a.installed_date || "") ? 1 : -1);

  // Bikes that have active components
  const bikesWithComponents = [...new Set(active.map(c => c.bike_name))];

  async function handleSave() {
    if (!form.bike_name || !form.component_type) return;
    setSaving(true);
    const rec = {
      ...form,
      installed_km: form.installed_km ? parseFloat(form.installed_km) : undefined,
    };
    Object.keys(rec).forEach(k => (rec[k] === "" || rec[k] === undefined) && delete rec[k]);
    console.log("BikeComponent.create disabled in static mode", rec);
    const updated = [];
    setComponents(updated || []);
    setForm(emptyForm);
    setShowForm(false);
    setSaving(false);
  }

  async function handleRetire(id, replacedKm) {
    const km = prompt("Odometer at replacement (km):", replacedKm || "");
    if (km === null) return;
    console.log("BikeComponent.update disabled", id, {
      status: "Replaced",
      replaced_date: new Date().toISOString().slice(0, 10),
      replaced_km: parseFloat(km) || undefined,
    });
    const updated = [];
    setComponents(updated || []);
  }

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>🔧 Component Tracker</div>
          <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>{active.length} active components across {bikesWithComponents.length} bikes</div>
        </div>
        <button onClick={() => setShowForm(!showForm)} style={{ background: STRAVA_ORANGE, color: "#fff", border: "none", padding: "10px 18px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
          {showForm ? "✕ Cancel" : "+ Add Component"}
        </button>
      </div>

      {/* Add form */}
      {showForm && (
        <div style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: 12, padding: 20, marginBottom: 24 }}>
          <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>Log New Component</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
            {[
              { label: "Bike", key: "bike_name", type: "select", options: BIKES },
              { label: "Component", key: "component_type", type: "select", options: COMPONENT_TYPES },
              { label: "Brand", key: "brand", type: "text", placeholder: "e.g. Shimano" },
              { label: "Model", key: "model", type: "text", placeholder: "e.g. Ultegra CN-7100" },
              { label: "Install Date", key: "installed_date", type: "date" },
              { label: "Odometer at Install (km)", key: "installed_km", type: "number", placeholder: "e.g. 11975" },
            ].map(f => (
              <div key={f.key}>
                <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>{f.label}</div>
                {f.type === "select" ? (
                  <select value={form[f.key]} onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))}
                    style={{ width: "100%", background: "#111", border: "1px solid #333", borderRadius: 6, padding: "8px 10px", color: "#fff", fontSize: 13 }}>
                    {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                ) : (
                  <input type={f.type} value={form[f.key]} placeholder={f.placeholder}
                    onChange={e => setForm(p => ({ ...p, [f.key]: e.target.value }))}
                    style={{ width: "100%", background: "#111", border: "1px solid #333", borderRadius: 6, padding: "8px 10px", color: "#fff", fontSize: 13, boxSizing: "border-box" }} />
                )}
              </div>
            ))}
          </div>
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 12, color: "#888", marginBottom: 4 }}>Notes</div>
            <input type="text" value={form.notes} placeholder="Any extra details..."
              onChange={e => setForm(p => ({ ...p, notes: e.target.value }))}
              style={{ width: "100%", background: "#111", border: "1px solid #333", borderRadius: 6, padding: "8px 10px", color: "#fff", fontSize: 13, boxSizing: "border-box" }} />
          </div>
          <button onClick={handleSave} disabled={saving}
            style={{ marginTop: 16, background: GREEN, color: "#fff", border: "none", padding: "10px 24px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
            {saving ? "Saving..." : "Save Component"}
          </button>
        </div>
      )}

      {/* Filters */}
      <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap" }}>
        <select value={filterBike} onChange={e => setFilterBike(e.target.value)}
          style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: 6, padding: "8px 12px", color: "#fff", fontSize: 13 }}>
          <option value="All">All Bikes</option>
          {BIKES.map(b => <option key={b} value={b}>{b}</option>)}
        </select>
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
          style={{ background: "#1a1a1a", border: "1px solid #333", borderRadius: 6, padding: "8px 12px", color: "#fff", fontSize: 13 }}>
          <option value="All">All Status</option>
          <option value="Active">Active</option>
          <option value="Replaced">Replaced</option>
        </select>
      </div>

      {/* Components list */}
      {filtered.length === 0 ? (
        <div style={{ background: "#1a1a1a", borderRadius: 12, padding: 40, textAlign: "center", color: "#555" }}>
          No components logged yet. Hit "+ Add Component" to start tracking.
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {filtered.map(c => {
            const interval = INTERVALS[c.component_type];
            const kmSince = c.installed_km ? null : null; // would need current bike km
            return (
              <div key={c.id} style={{ background: "#1a1a1a", border: `1px solid ${c.status === "Replaced" ? "#2a2a2a" : "#333"}`, borderRadius: 12, padding: "16px 20px", opacity: c.status === "Replaced" ? 0.6 : 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 8 }}>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                      <span style={{ fontSize: 15, fontWeight: 700, color: c.status === "Active" ? "#fff" : "#888" }}>{c.component_type}</span>
                      {c.brand && <span style={{ fontSize: 12, color: "#888" }}>{c.brand} {c.model}</span>}
                      <span style={{ fontSize: 11, padding: "2px 8px", borderRadius: 20, background: c.status === "Active" ? GREEN + "22" : "#333", color: c.status === "Active" ? GREEN : "#666", fontWeight: 600 }}>{c.status}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "#666" }}>🚲 {c.bike_name}</div>
                    <div style={{ fontSize: 12, color: "#666", marginTop: 4 }}>
                      {c.installed_date && `Installed: ${c.installed_date}`}
                      {c.installed_km && ` · at ${c.installed_km.toLocaleString()} km`}
                      {c.replaced_date && ` → Replaced: ${c.replaced_date}`}
                      {c.replaced_km && c.installed_km && ` (${(c.replaced_km - c.installed_km).toLocaleString()} km on component)`}
                    </div>
                    {interval && c.status === "Active" && (
                      <div style={{ fontSize: 11, color: YELLOW, marginTop: 4 }}>⏱ Typical interval: {interval.toLocaleString()} km</div>
                    )}
                    {c.notes && <div style={{ fontSize: 12, color: "#888", marginTop: 4, fontStyle: "italic" }}>{c.notes}</div>}
                  </div>
                  {c.status === "Active" && (
                    <button onClick={() => handleRetire(c.id, c.installed_km)}
                      style={{ background: "#2a2a2a", color: "#aaa", border: "1px solid #333", padding: "6px 14px", borderRadius: 6, cursor: "pointer", fontSize: 12, whiteSpace: "nowrap" }}>
                      Mark Replaced
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Body Stats Tab ──────────────────────────────────────────────────────────
function BodyStatsTab({ bodyStats, setBodyStats, uploading, setUploading }) {
  const STRAVA_ORANGE = "#fc4c02";
  const BLUE = "#1d9bf0";
  const GREEN = "#22c55e";
  const YELLOW = "#f59e0b";
  const RED = "#f87171";
  const PURPLE = "#a855f7";

  function parseVal(v) {
    if (!v || v.trim() === "--") return null;
    return parseFloat(v.replace(/%|lb|kcal/g, "").trim()) || null;
  }

  function parseDate(s) {
    // "Apr.18 2026 9:46 AM"
    try {
      const fixed = s.replace(".", " ").replace(/\./g, "");
      return new Date(fixed).toISOString().slice(0, 19);
    } catch { return s; }
  }

  async function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    const text = await file.text();
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim());
    const newRecords = [];
    for (let i = 1; i < lines.length; i++) {
      const vals = lines[i].split(",").map(v => v.trim());
      if (!vals[0]) continue;
      const row = {};
      headers.forEach((h, idx) => { row[h] = vals[idx] || ""; });
      const rec = {
        measured_at: parseDate(row["Time"] || ""),
        weight_lb: parseVal(row["Weight"]),
        bmi: parseVal(row["BMI"]),
        body_fat_pct: parseVal(row["Body Fat"]),
        subcutaneous_fat_pct: parseVal(row["Subcutaneous Fat"]),
        visceral_fat: parseVal(row["Visceral Fat"]),
        body_water_pct: parseVal(row["Body Water"]),
        skeletal_muscle_pct: parseVal(row["Skeletal Muscle"]),
        muscle_rate_pct: parseVal(row["Muscle Rate"]),
        muscle_mass_lb: parseVal(row["Muscle Mass"]),
        bone_mass_lb: parseVal(row["Bone Mass"]),
        bone_pct: parseVal(row["Bone Percentage"]),
        protein_pct: parseVal(row["Protein"]),
        bmr_kcal: parseVal(row["BMR"]),
        rmr_kcal: parseVal(row["RMR"]),
        metabolic_age: parseVal(row["Metabollic Age"]),
      };
      // Remove nulls
      Object.keys(rec).forEach(k => rec[k] === null && delete rec[k]);
      if (rec.measured_at) newRecords.push(rec);
    }
    // Upsert: skip duplicates by measured_at
    const existing = new Set(bodyStats.map(r => r.measured_at));
    const toAdd = newRecords.filter(r => !existing.has(r.measured_at));
    for (const rec of toAdd) {
      console.log("BodyStats.create disabled", rec);
    }
    const updated = await BodyStats.list();
    setBodyStats(updated || []);
    setUploading(false);
    alert(`Imported ${toAdd.length} new readings (${newRecords.length - toAdd.length} duplicates skipped).`);
  }

  // Prepare chart data — filter out ski gear readings by note, sort oldest first
  const chartData = [...bodyStats]
    .filter(r => !r.notes?.includes("ski gear"))
    .sort((a, b) => a.measured_at > b.measured_at ? 1 : -1)
    .map(r => ({
      date: r.measured_at ? r.measured_at.slice(0, 10) : "",
      label: r.measured_at ? new Date(r.measured_at).toLocaleDateString("en-CA", { month: "short", day: "numeric" }) : "",
      weight: r.weight_lb,
      bodyFat: r.body_fat_pct,
      muscleMass: r.muscle_mass_lb,
      visceralFat: r.visceral_fat,
      metabolicAge: r.metabolic_age,
      bmi: r.bmi,
    }));

  const latest = bodyStats.filter(r => !r.notes?.includes("ski gear")).sort((a, b) => b.measured_at > a.measured_at ? 1 : -1)[0];

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
        <div>
          <div style={{ fontSize: 20, fontWeight: 700 }}>⚖️ Body Composition</div>
          <div style={{ fontSize: 13, color: "#888", marginTop: 2 }}>Precision Hub scale data · {bodyStats.length} readings</div>
        </div>
        <label style={{ background: STRAVA_ORANGE, color: "#fff", padding: "10px 18px", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
          {uploading ? "Importing..." : "⬆️ Upload CSV"}
          <input type="file" accept=".csv" onChange={handleUpload} style={{ display: "none" }} disabled={uploading} />
        </label>
      </div>

      {/* Latest snapshot cards */}
      {latest && (
        <>
          <div style={{ fontSize: 14, color: "#888", marginBottom: 12 }}>
            Latest reading: {new Date(latest.measured_at).toLocaleDateString("en-CA", { month: "long", day: "numeric", year: "numeric" })}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 12, marginBottom: 32 }}>
            {[
              { label: "Weight", value: `${latest.weight_lb} lb`, color: STRAVA_ORANGE },
              { label: "BMI", value: latest.bmi, color: BLUE },
              { label: "Body Fat", value: `${latest.body_fat_pct}%`, color: YELLOW },
              { label: "Muscle Mass", value: `${latest.muscle_mass_lb} lb`, color: GREEN },
              { label: "Visceral Fat", value: latest.visceral_fat, color: latest.visceral_fat <= 9 ? GREEN : RED },
              { label: "Metabolic Age", value: latest.metabolic_age, color: PURPLE },
              { label: "Body Water", value: `${latest.body_water_pct}%`, color: BLUE },
              { label: "Skeletal Muscle", value: `${latest.skeletal_muscle_pct}%`, color: GREEN },
            ].map(c => (
              <div key={c.label} style={{ background: "#1a1a1a", border: "1px solid #2a2a2a", borderRadius: 10, padding: "14px 16px" }}>
                <div style={{ fontSize: 11, color: "#888", marginBottom: 4 }}>{c.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: c.color }}>{c.value}</div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* Weight trend */}
      <div style={{ background: "#1a1a1a", borderRadius: 12, padding: 20, marginBottom: 20 }}>
        <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 16 }}>Weight Trend (lb)</div>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={chartData}>
            <CartesianGrid strokeDasharray="3 3" stroke="#2a2a2a" />
            <XAxis dataKey="label" tick={{ fill: "#888", fontSize: 11 }} />
            <YAxis domain={["auto", "auto"]} tick={{ fill: "#888", fontSize: 11 }} />

                <Tooltip contentStyle={{ background: "#222", border: "1px solid #444", borderRadius: 8 }} labelStyle={{ color: "#fff" }} formatter={v => [`${v} bpm`, "Avg HR"]} />
                <Bar dataKey="avg_hr" name="Avg HR" radius={[0, 4, 4, 0]}>
                  {hrByType.map((entry, i) => <Cell key={i} fill={entry.color} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div style={{ marginTop: 12, padding: "14px 18px", background: "#1a1a1a", borderRadius: 10, borderLeft: `3px solid ${RED}` }}>
            <div style={{ fontSize: 13, color: "#888" }}>❤️ Notes</div>
            <div style={{ fontSize: 15, color: "#ddd", marginTop: 4 }}>Running is your hardest effort (129 bpm avg). Skiing barely registers at 81 bpm — instructor/patrol mode. Highest ever recorded: <span style={{ color: RED, fontWeight: 700 }}>218 bpm</span>. 🫀</div>
          </div>
        </>)}

        {/* RUNNING COMEBACK */}
        {activeTab === "Running Comeback" && (<>
          <SectionTitle>🦵 Running Comeback Tracker</SectionTitle>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 12 }}>
            <StatCard label="Knee Injury" value="Mar 2023" sub="Injured Mar, rebuilt Apr 26" color={RED} icon="🦵" />
            <StatCard label="First Run Back" value="Sep 2023" sub="6 months later" color={YELLOW} icon="🏃" />
            <StatCard label="Post-Injury Runs" value="47" sub="Slow & steady" color={GREEN} icon="📊" />
            <StatCard label="Longest Post-Injury" value={imperial ? "7.5 mi" : "12.0 km"} sub="Aug 28, 2025" color={GREEN} icon="📏" />
          </div>

          <SectionTitle>📅 Comeback Run Volume by Period</SectionTitle>
          <div style={{ background: "#1a1a1a", borderRadius: 12, padding: 20 }}>
            <ResponsiveContainer width="100%" height={260}>
              <BarChart data={comebackRuns}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2a2a2a" />
                <XAxis dataKey="period" tick={{ fill: "#888", fontSize: 10 }} />
                <YAxis tick={{ fill: "#888", fontSize: 11 }} />
                <Tooltip contentStyle={{ background: "#222", border: "1px solid #444", borderRadius: 8 }} labelStyle={{ color: "#fff" }} />
                <Bar dataKey="count" name="Runs" fill={GREEN} radius={[4, 4, 0, 0]} />
              </BarChart>
            </ResponsiveContainer>
          </div>

          <SectionTitle>📈 Avg Distance Per Period</SectionTitle>
          <div style={{ background: "#1a1a1a", borderRadius: 12, padding: 20 }}>
            <ResponsiveContainer width="100%" height={200}>
              <AreaChart data={comebackRuns}>
                <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={GREEN} stopOpacity={0.3}/><stop offset="95%" stopColor={GREEN} stopOpacity={0}/></linearGradient></defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#2a2a2a" />
                <XAxis dataKey="period" tick={{ fill: "#888", fontSize: 10 }} />
                <YAxis tick={{ fill: "#888", fontSize: 11 }} unit={imperial ? " mi" : " km"} />
                <Tooltip contentStyle={{ background: "#222", border: "1px solid #444", borderRadius: 8 }} labelStyle={{ color: "#fff" }} formatter={v => [imperial ? `${km2mi(v)} mi` : `${v} km`, "Avg Distance"]} />
                <Area type="monotone" dataKey="avg_km" stroke={GREEN} fill="url(#cg)" strokeWidth={2} dot={{ fill: GREEN, r: 4 }} />
              </AreaChart>
            </ResponsiveContainer>
          </div>

          <SectionTitle>🗓️ The Story So Far</SectionTitle>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {[
              { date: "Mar 2023", event: "Left knee injury — inoperable until inflammation subsided, reconstruction Apr 26", color: RED, detail: "Running essentially stops for 6 months" },
              { date: "Sep 2023", event: "First run back", color: YELLOW, detail: "C'wood East End Loop — 9 km, careful and slow" },
              { date: "Nov 2023", event: "Cruise ship chaos 🚢", color: "#94a3b8", detail: "GPS drift makes it look like you ran 40 km in 1 hr" },
              { date: "May–Jun 2024", event: "Biggest comeback block", color: GREEN, detail: "10 runs in 6 weeks — C'wood East End Loop becoming a staple" },
              { date: "Aug 2025", event: "Longest post-injury run", color: GREEN, detail: "12.0 km on Georgian Bay — building back nicely" },
              { date: "Now", event: "Missing: running partner 🇭🇺", color: BLUE, detail: "Knee is solid. Laszlo is in Sopron. The search continues." },
            ].map((e, i) => (
              <div key={i} style={{ background: "#1a1a1a", borderRadius: 10, padding: "12px 18px", display: "flex", gap: 16, alignItems: "flex-start", borderLeft: `3px solid ${e.color}` }}>
                <div style={{ minWidth: 80, fontSize: 12, color: "#666", paddingTop: 2 }}>{e.date}</div>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: e.color }}>{e.event}</div>
                  <div style={{ fontSize: 13, color: "#777", marginTop: 2 }}>{e.detail}</div>
                </div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 20, padding: "16px 18px", background: "#0f1f0f", borderRadius: 10, border: `1px solid #1a3a1a` }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: GREEN }}>💚 The Data Says...</div>
            <div style={{ fontSize: 14, color: "#bbb", marginTop: 6, lineHeight: 1.6 }}>
              You're running again. Not at 2021 volume (150 runs) but the knee isn't the limiter anymore — it's motivation and a partner. Your post-injury runs are consistently 8-12 km which is solid base fitness. If you found a Laszlo-replacement, you'd be back to 50+ runs a year within a season.
            </div>
          </div>
        </>)}

        <div style={{ marginTop: 40, textAlign: "center", color: "#444", fontSize: 12 }}>
          Data from Strava · {totals.activities.toLocaleString()} activities · 2012–2026 · Refreshes nightly · Built by Emma 🤖
        </div>
      </div>

      {activeTab === "Components" && (
        <div style={{ padding: "24px 32px" }}>
          <ComponentsTab components={components} setComponents={setComponents} />
        </div>
      )}
      {activeTab === "Body Stats" && (
        <div style={{ padding: "24px 32px" }}>
          <BodyStatsTab bodyStats={bodyStats} setBodyStats={setBodyStats} uploading={uploading} setUploading={setUploading} />
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
