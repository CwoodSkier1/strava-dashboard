<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todd's Strava Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{background:linear-gradient(135deg,#1a0a00,#111);border-bottom:1px solid #2a2a2a;padding:20px 24px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;border-radius:9px;background:#fc4c02;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-title{font-size:20px;font-weight:800}
.logo-sub{font-size:12px;color:#777;margin-top:2px}
.unit-toggle{display:flex;gap:6px}
.unit-btn{background:#222;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.unit-btn.active{background:#fc4c02;border-color:#fc4c02;color:#fff}
nav{display:flex;overflow-x:auto}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;font-size:14px;font-weight:600;padding:12px 20px;white-space:nowrap}
.tab:hover{color:#fff}.tab.active{color:#fc4c02;border-bottom-color:#fc4c02}
main{padding:24px;max-width:1400px;margin:0 auto}
.page{display:none}.page.active{display:block}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.sc{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px}
.sl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.sv{font-size:22px;font-weight:800}
.ss{font-size:11px;color:#666;margin-top:2px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:20px}
.ct{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #1e1e1e;font-size:13px}
.row:last-child{border-bottom:none}
.rn{font-weight:600}.rs{color:#666;font-size:11px;margin-top:2px}.rv{font-weight:700;text-align:right;flex-shrink:0;margin-left:12px}
.callout{background:linear-gradient(135deg,#1a1a00,#111);border:1px solid #3a3a00;border-radius:12px;padding:14px 18px;margin-bottom:20px}
.callout-t{font-size:13px;font-weight:700;color:#f59e0b;margin-bottom:5px}
.callout-b{font-size:13px;color:#ccc;line-height:1.6}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
@media(max-width:650px){.g2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:#555;border-bottom:1px solid #2a2a2a;font-size:11px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #1a1a1a}
tr:last-child td{border-bottom:none}
.empty{color:#555;text-align:center;padding:24px 0;font-size:13px}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏔️</div>
      <div>
        <div class="logo-title">Todd's Strava Dashboard</div>
        <div class="logo-sub" id="hsub">Loading...</div>
      </div>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" onclick="setU(0)">km / m</button>
      <button class="unit-btn" onclick="setU(1)">mi / ft</button>
    </div>
  </div>
  <nav>
    <button class="tab active" onclick="show('ov',this)">Overview</button>
    <button class="tab" onclick="show('cy',this)">Cycling</button>
    <button class="tab" onclick="show('rh',this)">Running &amp; Hiking</button>
    <button class="tab" onclick="show('sk',this)">Skiing</button>
    <button class="tab" onclick="show('bs',this)">Body Stats</button>
  </nav>
</header>
<main>
  <div id="ov" class="page active"></div>
  <div id="cy" class="page"></div>
  <div id="rh" class="page"></div>
  <div id="sk" class="page"></div>
  <div id="bs" class="page"></div>

let imp=false;
const fD=v=>imp?((+(v||0)*0.621371).toFixed(1)+' mi'):(Math.round(v||0).toLocaleString()+' km');
const fV=v=>imp?(Math.round((v||0)*3.28084).toLocaleString()+' ft'):(Math.round(v||0).toLocaleString()+' m');
const fT=h=>{const hh=Math.floor(h||0),mm=Math.round(((h||0)-hh)*60);return hh+'h'+(mm?' '+mm+'m':'');};
const du=()=>imp?'mi':'km', vu=()=>imp?'ft':'m';

function setU(i){imp=i===1;document.querySelectorAll('.unit-btn').forEach((b,j)=>b.classList.toggle('active',j===i));render();}
function show(id,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');el.classList.add('active');}

function svgBar(data,kx,keys,cols,h=200){
  const W=900,PL=50,PR=10,PT=8,PB=28,cw=W-PL-PR,ch=h-PT-PB;
  const maxV=Math.max(1,...data.map(d=>keys.reduce((s,k)=>s+(+d[k]||0),0)));
  const bw=(cw/data.length)*0.72,gap=(cw/data.length)*0.28;
  const sc=ch/maxV;
  const ticks=4;
  let g='',bars='',labs='';
  for(let i=0;i<=ticks;i++){const val=maxV*i/ticks,y=PT+ch-val*sc;g+=`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="#222"/>`;g+=`<text x="${PL-4}" y="${y+4}" fill="#555" font-size="10" text-anchor="end">${Math.round(val).toLocaleString()}</text>`;}
  data.forEach((d,i)=>{
    const x=PL+i*(cw/data.length)+gap/2;let yb=PT+ch;
    keys.forEach((k,ki)=>{const val=+d[k]||0,bh=val*sc;if(bh>0.5){bars+=`<rect x="${x.toFixed(1)}" y="${(yb-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${cols[ki]}" rx="1"><title>${d[kx]}: ${val.toLocaleString()}</title></rect>`;yb-=bh;}});
    const step=Math.ceil(data.length/12);
    if(i%step===0||i===data.length-1)labs+=`<text x="${(x+bw/2).toFixed(1)}" y="${h-4}" fill="#555" font-size="9" text-anchor="middle">${d[kx]}</text>`;
  });
  return `<div style="width:100%;overflow-x:auto"><svg viewBox="0 0 ${W} ${h}" width="100%" height="${h}">${g}${bars}${labs}</svg></div>`;
}

function sc2(l,v,c='#fff',s=''){return `<div class="sc"><div class="sl">${l}</div><div class="sv" style="color:${c}">${v}</div>${s?`<div class="ss">${s}</div>`:''}</div>`;}
function card(t,c){return `<div class="card"><div class="ct">${t}</div>${c}</div>`;}
function rows(arr,nFn,vFn,vc){return arr.map(r=>`<div class="row"><div><div class="rn">${nFn(r)}</div><div class="rs">${r.date||''}</div></div><div class="rv" style="color:${vc}">${vFn(r)}</div></div>`).join('');}

    <div class="sg">
      ${sc2('Total Runs',(t.runs||0).toLocaleString(),'#22c55e')}
      ${sc2('Run Distance',fD(t.run_km),'#22c55e')}
      ${sc2('Total Hikes',(t.hikes||0).toLocaleString(),'#f59e0b')}
      ${sc2('Hike Distance',fD(4376),'#f59e0b')}
    </div>
    <div class="callout"><div class="callout-t">💡 2025 Hike Strategy — The Training Edge</div><div class="callout-b">67 hikes in 2025 on the 12th Concession & 3rd Line — ~1,200 ft per outing. Deliberate post-knee reconstruction training that directly enabled a 107-day, 909,519m ski season in 2025-26.</div></div>
    ${card('🏃 Run & Hike Distance by Year ('+du()+')',svgBar(yrc,'year',['run_km','hike_km'],['#22c55e','#f59e0b']))}
    <div class="g2">
      ${card('🏆 Top Runs',rows(D.topRuns,r=>r.name,r=>fD(r.dist_km),'#22c55e'))}
      ${card('📋 Last 7 Days — Run & Hike',rh.length===0?'<div class="empty">No recent activity</div>':
        rh.map(r=>{const isR=(r.type||'').toLowerCase().includes('run');return`<div class="row"><div><div class="rn">${isR?'🏃':'🥾'} ${r.name}</div><div class="rs">${new Date(r.date).toLocaleDateString('en-CA',{month:'short',day:'numeric'})}</div></div><div class="rv" style="color:${isR?'#22c55e':'#f59e0b'}">${fD(r.dist_km)}</div></div>`;}).join('')
      )}
    </div>`;

  // SKIING
  document.getElementById('sk').innerHTML=`
    <div class="sg">
      ${sc2('Total Ski Days',(t.skiDays||0).toLocaleString(),'#1d9bf0')}
      ${sc2('25-26 Days','107','#1d9bf0')}
      ${sc2('25-26 Vertical',fV(909519),'#1d9bf0')}
      ${sc2('Best Day Vert',fV(14833),'#a855f7','Mar 27, 2026')}
    </div>
    ${card('⛷️ Seasonal Vertical ('+vu()+')',svgBar(skc,'season',['vert_m'],['#1d9bf0'],220))}
    ${card('📅 Ski Days per Season',svgBar(D.skiSeasons,'season',['days'],['#38bdf8'],160))}
    <div class="g2">
      ${card('🏆 Top 5 Ski Days',rows(D.topSki,r=>r.name,r=>fV(r.vert_m),'#1d9bf0'))}
      ${card('📋 Last 7 Days — Skiing','<div class="empty">Season is over — see you next November! ⛷️</div>')}
    </div>`;

  // BODY STATS
  const latest=BS[BS.length-1];
  const wt=imp?v=>(v*0.453592).toFixed(1)+' kg':v=>v+' lb';
  document.getElementById('bs').innerHTML=`
    <div class="sg">
      ${sc2('Weight',latest.weight_lb+' lb','#fc4c02','latest')}
      ${sc2('BMI',latest.bmi,'#fff')}
      ${sc2('Body Fat',latest.body_fat_pct+'%','#f87171')}
      ${sc2('Muscle Mass',latest.muscle_mass_lb+' lb','#22c55e')}
      ${sc2('Visceral Fat',latest.visceral_fat,'#fff')}
      ${sc2('Metabolic Age',latest.metabolic_age,'#1d9bf0')}
    </div>
    ${card('⚖️ Weight Trend (lb)',svgBar(BS,'measured_at',['weight_lb'],['#fc4c02'],180))}
    ${card('📋 All Body Stats Readings',
      '<div style="overflow-x:auto"><table><tr><th>Date</th><th>Weight</th><th>BMI</th><th>Body Fat</th><th>Muscle</th><th>Visceral Fat</th><th>Met. Age</th></tr>'+
      [...BS].reverse().map(r=>`<tr>
        <td style="color:#777;white-space:nowrap">${new Date(r.measured_at).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'})}</td>
        <td style="font-weight:600">${r.weight_lb} lb</td>
        <td>${r.bmi}</td>
        <td style="color:#f87171">${r.body_fat_pct}%</td>
        <td style="color:#22c55e">${r.muscle_mass_lb} lb</td>
        <td>${r.visceral_fat}</td>
        <td style="color:#1d9bf0">${r.metabolic_age}</td>
      </tr>`).join('')+'</table></div>'
    )}`;
}

render();
</script>
</body>
</html>
