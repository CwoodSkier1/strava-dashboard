<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todd's Strava Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
header{background:linear-gradient(135deg,#1a0a00,#111);border-bottom:1px solid #2a2a2a;padding:20px 24px 0}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;border-radius:9px;background:#fc4c02;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-title{font-size:20px;font-weight:800}
.logo-sub{font-size:12px;color:#777;margin-top:2px}
.unit-toggle{display:flex;gap:6px}
.unit-btn{background:#222;border:1px solid #333;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.unit-btn.active{background:#fc4c02;border-color:#fc4c02;color:#fff}
nav{display:flex;overflow-x:auto;gap:0}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:#888;cursor:pointer;font-size:14px;font-weight:600;padding:12px 20px;white-space:nowrap}
.tab:hover{color:#fff}
.tab.active{color:#fc4c02;border-bottom-color:#fc4c02}
main{padding:24px;max-width:1400px;margin:0 auto}
.page{display:none}.page.active{display:block}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:16px}
.stat-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:800}
.stat-sub{font-size:11px;color:#666;margin-top:2px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:20px;margin-bottom:20px}
.card-title{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #2a2a2a}
.bar-chart{width:100%;overflow-x:auto}
.bar-chart svg{display:block}
.list-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e1e1e;font-size:13px}
.list-row:last-child{border-bottom:none}
.list-name{font-weight:600}
.list-sub{color:#666;font-size:11px;margin-top:2px}
.list-val{font-weight:700;text-align:right}
.callout{background:linear-gradient(135deg,#1a1a00,#111);border:1px solid #3a3a00;border-radius:12px;padding:14px 18px;margin-bottom:20px}
.callout-title{font-size:13px;font-weight:700;color:#f59e0b;margin-bottom:5px}
.callout-body{font-size:13px;color:#ccc;line-height:1.6}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.grid2{grid-template-columns:1fr}}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:8px 10px;text-align:left;color:#666;border-bottom:1px solid #333;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #1e1e1e}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🏔️</div>
      <div>
        <div class="logo-title">Todd's Strava Dashboard</div>
        <div class="logo-sub" id="header-sub">Loading...</div>
      </div>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" onclick="setUnit('metric')">km / m</button>
      <button class="unit-btn" onclick="setUnit('imperial')">mi / ft</button>
    </div>
  </div>
  <nav>
    <button class="tab active" onclick="showTab('overview')">Overview</button>
    <button class="tab" onclick="showTab('cycling')">Cycling</button>
    <button class="tab" onclick="showTab('running')">Running &amp; Hiking</button>
    <button class="tab" onclick="showTab('skiing')">Skiing</button>
  </nav>
</header>
<main>
  <div id="overview" class="page active"></div>
  <div id="cycling" class="page"></div>
  <div id="running" class="page"></div>
  <div id="skiing" class="page"></div>
</main>
<script>
const D = {"totals": {"activities": 3908, "distance_km": 137613, "hours": 7750, "elev_m": 6467829, "rides": 1366, "skiDays": 915, "runs": 834, "hikes": 377}, "yearly": [{"year": "2012", "count": 55, "distance_km": 2289, "time_hrs": 98, "rides": 55, "runs": 0, "ski": 0, "hikes": 0, "other": 0, "ride_km": 2289, "run_km": 0, "hike_km": 0}, {"year": "2013", "count": 18, "distance_km": 619, "time_hrs": 24, "rides": 18, "runs": 0, "ski": 0, "hikes": 0, "other": 0, "ride_km": 619, "run_km": 0, "hike_km": 0}, {"year": "2014", "count": 62, "distance_km": 2163, "time_hrs": 81, "rides": 62, "runs": 0, "ski": 0, "hikes": 0, "other": 0, "ride_km": 2163, "run_km": 0, "hike_km": 0}, {"year": "2015", "count": 216, "distance_km": 5127, "time_hrs": 279, "rides": 119, "runs": 44, "ski": 0, "hikes": 37, "other": 16, "ride_km": 4582, "run_km": 263, "hike_km": 282}, {"year": "2016", "count": 349, "distance_km": 6911, "time_hrs": 423, "rides": 84, "runs": 121, "ski": 73, "hikes": 21, "other": 50, "ride_km": 3199, "run_km": 1003, "hike_km": 429}, {"year": "2017", "count": 299, "distance_km": 8486, "time_hrs": 456, "rides": 68, "runs": 119, "ski": 88, "hikes": 5, "other": 19, "ride_km": 3014, "run_km": 1073, "hike_km": 61}, {"year": "2018", "count": 300, "distance_km": 10798, "time_hrs": 589, "rides": 84, "runs": 83, "ski": 89, "hikes": 20, "other": 24, "ride_km": 4207, "run_km": 822, "hike_km": 288}, {"year": "2019", "count": 426, "distance_km": 14860, "time_hrs": 879, "rides": 133, "runs": 122, "ski": 105, "hikes": 35, "other": 31, "ride_km": 7491, "run_km": 1141, "hike_km": 462}, {"year": "2020", "count": 295, "distance_km": 11590, "time_hrs": 621, "rides": 89, "runs": 94, "ski": 80, "hikes": 20, "other": 12, "ride_km": 5668, "run_km": 894, "hike_km": 231}, {"year": "2021", "count": 347, "distance_km": 10867, "time_hrs": 653, "rides": 96, "runs": 150, "ski": 53, "hikes": 35, "other": 13, "ride_km": 5834, "run_km": 1389, "hike_km": 408}, {"year": "2022", "count": 328, "distance_km": 11980, "time_hrs": 686, "rides": 84, "runs": 48, "ski": 102, "hikes": 49, "other": 45, "ride_km": 4041, "run_km": 483, "hike_km": 358}, {"year": "2023", "count": 374, "distance_km": 9189, "time_hrs": 633, "rides": 128, "runs": 19, "ski": 55, "hikes": 55, "other": 117, "ride_km": 3604, "run_km": 263, "hike_km": 637}, {"year": "2024", "count": 333, "distance_km": 14868, "time_hrs": 801, "rides": 149, "runs": 27, "ski": 83, "hikes": 20, "other": 54, "ride_km": 6932, "run_km": 248, "hike_km": 418}, {"year": "2025", "count": 383, "distance_km": 18270, "time_hrs": 1031, "rides": 176, "runs": 6, "ski": 101, "hikes": 67, "other": 33, "ride_km": 8715, "run_km": 48, "hike_km": 810}, {"year": "2026*", "count": 123, "distance_km": 9594, "time_hrs": 495, "rides": 21, "runs": 1, "ski": 86, "hikes": 13, "other": 2, "ride_km": 1222, "run_km": 6, "hike_km": 50}], "skiSeasons": [{"season": "15-16", "days": 66, "vert_m": 209603}, {"season": "16-17", "days": 75, "vert_m": 323836}, {"season": "17-18", "days": 81, "vert_m": 447464}, {"season": "18-19", "days": 107, "vert_m": 617286}, {"season": "19-20", "days": 94, "vert_m": 524467}, {"season": "20-21", "days": 57, "vert_m": 329320}, {"season": "21-22", "days": 96, "vert_m": 660360}, {"season": "22-23", "days": 65, "vert_m": 486216}, {"season": "23-24", "days": 73, "vert_m": 616160}, {"season": "24-25", "days": 94, "vert_m": 764368}, {"season": "25-26", "days": 107, "vert_m": 909519}], "topRides": [{"name": "C'wood|Phelpston|Penetang|Wasaga", "date": "Aug 14, 2025", "dist_km": 164.33, "elev_m": 804}, {"name": "C'wood|Orr Lake|Balm Beach|Wasaga", "date": "Aug 29, 2024", "dist_km": 147.73, "elev_m": 590}, {"name": "C'wood|Wasaga|NewLowell|Angus", "date": "Sep 20, 2025", "dist_km": 143.24, "elev_m": 354}, {"name": "C'wood|Orr Lake|Balm Beach|Wasaga", "date": "Aug 14, 2024", "dist_km": 140.87, "elev_m": 558}, {"name": "C'wood|Orr Lake|Balm Beach|Wasaga", "date": "Sep 12, 2024", "dist_km": 140.53, "elev_m": 577}], "topSki": [{"name": "Blue Mtn - Mar 27, 2026", "date": "Mar 27, 2026", "vert_m": 14833}, {"name": "Blue Mtn - Mar 29, 2022", "date": "Mar 29, 2022", "vert_m": 13723}, {"name": "Blue Mtn - Mar 28, 2026", "date": "Mar 28, 2026", "vert_m": 13718}, {"name": "Blue Mtn - Apr 1, 2022", "date": "Apr 1, 2022", "vert_m": 13605}, {"name": "Blue Mtn - Feb 8, 2024", "date": "Feb 8, 2024", "vert_m": 13366}], "topRuns": [{"name": "Blue|CSC|ASC|GP Ski Club Loop", "date": "Jun 11, 2021", "dist_km": 22.74}, {"name": "Blue|CSC|ASC|GP Ski Club Loop", "date": "Nov 4, 2018", "dist_km": 21.14}, {"name": "HB.C to Tommy Thompson Park", "date": "Apr 21, 2018", "dist_km": 19.78}, {"name": "C'wood Full Loop", "date": "May 3, 2018", "dist_km": 17.06}], "recentRides": [{"name": "C'Wood|W.B.|Stayner|Blue Loop", "date": "2026-05-19", "dist_km": 68.9, "time_hrs": 2.9, "elev_m": 207}, {"name": "C'wood|Phelpston|Wyeville|Wasaga", "date": "2026-05-18", "dist_km": 117.3, "time_hrs": 4.5, "elev_m": 431}, {"name": "C'wood East End Loop", "date": "2026-05-16", "dist_km": 11.7, "time_hrs": 0.7, "elev_m": 17}, {"name": "C'Wood|Stayner|W.B. Gravel Loop", "date": "2026-05-15", "dist_km": 106.3, "time_hrs": 4.6, "elev_m": 198}, {"name": "C'wood|BlueMtns|Wasaga Beach Trail", "date": "2026-05-11", "dist_km": 71.0, "time_hrs": 3.4, "elev_m": 217}], "recentSki": [], "recentRunHike": [{"name": "Lake Couchiching Beer Loop", "date": "2026-05-17", "dist_km": 3.9, "time_hrs": 0.9, "elev_m": 38, "type": "Walk"}, {"name": "12th Sideroad & 3rd Line O&B", "date": "2026-05-16", "dist_km": 12.2, "time_hrs": 2.4, "elev_m": 347, "type": "Hike"}, {"name": "12th Sideroad & 3rd Line O&B", "date": "2026-05-12", "dist_km": 12.1, "time_hrs": 2.4, "elev_m": 349, "type": "Hike"}, {"name": "Blue|CSC|ASC|GP Ski Club Loop", "date": "2026-05-10", "dist_km": 19.4, "time_hrs": 4.4, "elev_m": 447, "type": "Hike"}, {"name": "12th Sideroad & 3rd Line O&B", "date": "2026-05-09", "dist_km": 12.0, "time_hrs": 2.4, "elev_m": 349, "type": "Hike"}], "lastUpdated": "2026-05-20T07:06:47.035Z"};

let imperial = false;
const fmt = {
  d: v => imperial ? ((v*0.621371).toFixed(1)+' mi') : (Math.round(v||0).toLocaleString()+' km'),
  v: v => imperial ? (Math.round((v||0)*3.28084).toLocaleString()+' ft') : (Math.round(v||0).toLocaleString()+' m'),
  t: h => { const hh=Math.floor(h||0),mm=Math.round(((h||0)-hh)*60); return hh+'h'+(mm?' '+mm+'m':''); },
  du: () => imperial?'mi':'km',
  vu: () => imperial?'ft':'m',
};

function setUnit(u) {
  imperial = u==='imperial';
  document.querySelectorAll('.unit-btn').forEach((b,i)=>{
    b.classList.toggle('active', imperial ? i===1 : i===0);
  });
  render();
}

function showTab(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function svgBar(data, keyX, keys, colors, h=220) {
  const W=800, H=h, PL=45, PR=10, PT=10, PB=30;
  const cw=W-PL-PR, ch=H-PT-PB;
  const maxV = Math.max(...data.map(d=>keys.reduce((s,k)=>s+(+d[k]||0),0)));
  const bw = (cw/data.length)*0.7, gap=(cw/data.length)*0.3;
  const scale = maxV>0 ? ch/maxV : 1;
  
  // Y axis ticks
  const ticks=5;
  let yticks='';
  for(let i=0;i<=ticks;i++){
    const val=maxV*i/ticks;
    const y=PT+ch-val*scale;
    yticks+=`<line x1="${PL}" x2="${W-PR}" y1="${y}" y2="${y}" stroke="#222" stroke-width="1"/>`;
    yticks+=`<text x="${PL-5}" y="${y+4}" fill="#555" font-size="10" text-anchor="end">${Math.round(val).toLocaleString()}</text>`;
  }
  
  let bars='', labels='';
  data.forEach((d,i)=>{
    const x=PL+i*(cw/data.length)+gap/2;
    let yBase=PT+ch;
    keys.forEach((k,ki)=>{
      const val=+d[k]||0;
      const bh=val*scale;
      if(bh>0) bars+=`<rect x="${x}" y="${yBase-bh}" width="${bw}" height="${bh}" fill="${colors[ki]}" rx="1"><title>${k}: ${val.toLocaleString()}</title></rect>`;
      yBase-=bh;
    });
    if(i%Math.ceil(data.length/10)===0||data.length<=15)
      labels+=`<text x="${x+bw/2}" y="${H-5}" fill="#555" font-size="9" text-anchor="middle">${d[keyX]}</text>`;
  });
  
  return `<div class="bar-chart"><svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">${yticks}${bars}${labels}</svg></div>`;
}

function card(title, content) {
  return `<div class="card"><div class="card-title">${title}</div>${content}</div>`;
}

function statCard(label, value, color='#fff', sub='') {
  return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value" style="color:${color}">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}

function listRows(items, nameFn, valFn, color) {
  return items.map(r=>`<div class="list-row"><div><div class="list-name">${nameFn(r)}</div><div class="list-sub">${r.date||''}</div></div><div class="list-val" style="color:${color}">${valFn(r)}</div></div>`).join('');
}

function render() {
  const t=D.totals, yr=D.yearly;
  const cur=yr.find(y=>y.year==='2026*')||{};
  const lu=D.lastUpdated?new Date(D.lastUpdated).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}):'';
  
  document.getElementById('header-sub').textContent=
    `14 years · ${(t.activities||0).toLocaleString()} activities · Since June 2012${lu?' · Updated '+lu:''}`;

  // OVERVIEW
  const yrc = imperial ? yr.map(y=>({...y,ride_km:+(y.ride_km*0.621371).toFixed(1),run_km:+(y.run_km*0.621371).toFixed(1),hike_km:+(y.hike_km*0.621371).toFixed(1)})) : yr;
  document.getElementById('overview').innerHTML = `
    <div class="stats-grid">
      ${statCard('Total Activities',(t.activities||0).toLocaleString(),'#fc4c02')}
      ${statCard('Total Distance',fmt.d(t.distance_km),'#fff','all sports')}
      ${statCard('Total Hours',fmt.t(t.hours||t.time_hrs))}
      ${statCard('Ride Distance',fmt.d(t.ride_km),'#fc4c02')}
      ${statCard('Run Distance',fmt.d(t.run_km),'#22c55e')}
      ${statCard('Ski Days',(t.skiDays||0).toString(),'#1d9bf0')}
    </div>
    ${card('📅 2026 So Far',`<div class="stats-grid">
      ${statCard('Activities',(cur.count||0).toString())}
      ${statCard('Ride Distance',fmt.d(cur.ride_km||0),'#fc4c02')}
      ${statCard('Ski Days',(cur.ski||0).toString(),'#1d9bf0')}
      ${statCard('Hikes',(cur.hikes||0).toString(),'#f59e0b')}
      ${statCard('Hours',fmt.t(cur.time_hrs||0))}
    </div>`)}
    ${card('📊 Yearly Volume — Activity Count',svgBar(yr,'year',['rides','runs','ski','hikes','other'],['#fc4c02','#22c55e','#1d9bf0','#f59e0b','#555']))}
    ${card('🚴 Ride Distance by Year ('+fmt.du()+')',svgBar(yrc,'year',['ride_km'],['#fc4c02']))}
  `;

  // CYCLING
  const rr=D.recentRides||[];
  document.getElementById('cycling').innerHTML = `
    <div class="stats-grid">
      ${statCard('Total Rides',(t.rides||0).toLocaleString(),'#fc4c02')}
      ${statCard('Total Distance',fmt.d(t.ride_km),'#fc4c02')}
      ${statCard('2026 Rides',(cur.rides||0).toString())}
      ${statCard('2026 Distance',fmt.d(cur.ride_km||0),'#fc4c02')}
    </div>
    <div class="grid2">
      ${card('🏆 Top 5 Rides',listRows(D.topRides,r=>r.name,r=>fmt.d(r.dist_km)+'<br><small style="color:#666">'+fmt.v(r.elev_m)+'</small>','#fc4c02'))}
      ${card('🚲 Fleet',['2020 Scott Addict 10 Gravel|11975|#fc4c02','2021 Scott Addict RC Ultimate|9603|#1d9bf0','Scott 2016 Foil Team Issue|8515|#22c55e','Scott Addict 20 Disc 2018|5869|#a855f7','Scott Addict RC Ultimate 2020|4710|#f59e0b'].map(s=>{const[n,k,c]=s.split('|');return`<div class="list-row"><span style="font-weight:600;color:${c}">${n}</span><span style="color:#aaa">${fmt.d(+k)}</span></div>`;}).join(''))}
    </div>
    ${card('📋 Last 7 Days — Cycling', rr.length===0
      ? '<div style="color:#555;text-align:center;padding:20px">No rides in the last 7 days</div>'
      : '<table><tr><th>Date</th><th>Name</th><th>Dist</th><th>Time</th><th>Elev</th></tr>'+
        rr.slice(0,7).map(r=>`<tr><td style="color:#777">${new Date(r.date).toLocaleDateString('en-CA',{month:'short',day:'numeric'})}</td><td>${r.name}</td><td style="color:#fc4c02;font-weight:600">${fmt.d(r.dist_km)}</td><td style="color:#aaa">${fmt.t(r.time_hrs)}</td><td style="color:#aaa">${fmt.v(r.elev_m)}</td></tr>`).join('')+'</table>'
    )}
  `;

  // RUNNING & HIKING
  const rh=D.recentRunHike||[];
  const skc = imperial ? D.skiSeasons.map(s=>({...s,vert_m:Math.round(s.vert_m*3.28084)})) : D.skiSeasons;
  document.getElementById('running').innerHTML = `
    <div class="stats-grid">
      ${statCard('Total Runs',(t.runs||0).toLocaleString(),'#22c55e')}
      ${statCard('Run Distance',fmt.d(t.run_km),'#22c55e')}
      ${statCard('Total Hikes',(t.hikes||0).toLocaleString(),'#f59e0b')}
      ${statCard('Hike Distance',fmt.d(t.hike_km||4376),'#f59e0b')}
    </div>
    <div class="callout">
      <div class="callout-title">💡 2025 Hike Strategy — The Training Edge</div>
      <div class="callout-body">67 hikes in 2025 on the 12th Concession & 3rd Line — ~1,200 ft per outing. Deliberate post-knee reconstruction training that directly enabled a 107-day, 909,519m ski season in 2025-26.</div>
    </div>
    ${card('🏃 Run & Hike Distance by Year ('+fmt.du()+')',svgBar(yrc,'year',['run_km','hike_km'],['#22c55e','#f59e0b']))}
    <div class="grid2">
      ${card('🏆 Top Runs',listRows(D.topRuns,r=>r.name,r=>fmt.d(r.dist_km),'#22c55e'))}
      ${card('📋 Last 7 Days',rh.length===0
        ? '<div style="color:#555;text-align:center;padding:20px">No recent activity</div>'
        : rh.slice(0,7).map(r=>{const isRun=(r.type||'').toLowerCase().includes('run');return`<div class="list-row"><div><div class="list-name">${isRun?'🏃':'🥾'} ${r.name}</div><div class="list-sub">${new Date(r.date).toLocaleDateString('en-CA',{month:'short',day:'numeric'})}</div></div><div class="list-val" style="color:${isRun?'#22c55e':'#f59e0b'}">${fmt.d(r.dist_km)}</div></div>`;}).join('')
      )}
    </div>
  `;

  // SKIING
  document.getElementById('skiing').innerHTML = `
    <div class="stats-grid">
      ${statCard('Total Ski Days',(t.skiDays||0).toLocaleString(),'#1d9bf0')}
      ${statCard('25-26 Days','107','#1d9bf0')}
      ${statCard('25-26 Vertical',fmt.v(909519),'#1d9bf0')}
      ${statCard('Best Day Vert',fmt.v(14833),'#a855f7','Mar 27, 2026')}
    </div>
    ${card('⛷️ Seasonal Vertical ('+fmt.vu()+')',svgBar(skc,'season',['vert_m'],['#1d9bf0'],220))}
    ${card('📅 Ski Days per Season',svgBar(D.skiSeasons,'season',['days'],['#38bdf8'],160))}
    <div class="grid2">
      ${card('🏆 Top 5 Ski Days',listRows(D.topSki,r=>r.name,r=>fmt.v(r.vert_m),'#1d9bf0'))}
      ${card('📋 Last 7 Days — Skiing','<div style="color:#555;text-align:center;padding:20px">No ski days — season is over! ⛷️</div>')}
    </div>
  `;
}

render();
</script>
</body>
</html>
