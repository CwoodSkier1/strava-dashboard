function ComponentsTab({
  components,
  setComponents
}) {
  const STRAVA_ORANGE = "#fc4c02";
  const BLUE = "#1d9bf0";
  const GREEN = "#22c55e";
  const YELLOW = "#f59e0b";
  const RED = "#f87171";
  const BIKES = ["2020 Scott Addict 10 Gravel", "2021 Scott Addict RC Ultimate", "Scott 2016 Foil Team Issue", "Scott Addict 20 Disc 2018", "Scott Addict RC Ultimate 2020", "Scott Subcross 740 2017", "Scott Big Jon 2021 (MTB)", "Other"];

    "Cable & Housing": 10000,
    "Bottom Bracket": 15000,
    "Chainring": 15000
  };
  const emptyForm = {
    bike_name: BIKES[0],
    component_type: "Chain",
    brand: "",
    model: "",
    installed_date: "",
    installed_km: "",
    notes: "",
    status: "Active"
  };
  const [form, setForm] = useState(emptyForm);
  const [showForm, setShowForm] = useState(false);
  const [filterBike, setFilterBike] = useState("All");
  const [filterStatus, setFilterStatus] = useState("Active");
  const [saving, setSaving] = useState(false);
  const active = components.filter(c => c.status === "Active");
  const filtered = components.filter(c => filterBike === "All" || c.bike_name === filterBike).filter(c => filterStatus === "All" || c.status === filterStatus).sort((a, b) => (b.installed_date || "") > (a.installed_date || "") ? 1 : -1);

  // Bikes that have active components
  const bikesWithComponents = [...new Set(active.map(c => c.bike_name))];
  async function handleSave() {
    if (!form.bike_name || !form.component_type) return;
    setSaving(true);
    const rec = {
      ...form,
      installed_km: form.installed_km ? parseFloat(form.installed_km) : undefined
